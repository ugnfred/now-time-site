<!DOCTYPE html>

<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #0a0a12;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Grid background */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow blobs */
.blob1 {
  position: absolute; width: 500px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.25) 0%, transparent 70%);
  top: -100px; left: -80px;
}
.blob2 {
  position: absolute; width: 400px; height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(6,182,212,0.18) 0%, transparent 70%);
  bottom: -80px; right: 80px;
}
.blob3 {
  position: absolute; width: 300px; height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,63,94,0.12) 0%, transparent 70%);
  top: 100px; right: 300px;
}

/* Main layout */
.container {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 56px 72px;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: auto;
}
.logo {
  font-size: 32px; font-weight: 700; letter-spacing: 3px;
  color: #fff;
}
.logo span {
  background: linear-gradient(135deg, #7c3aed, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.domain {
  font-size: 16px; color: rgba(255,255,255,0.35);
  letter-spacing: 2px; font-family: monospace;
}

/* Center content */
.center {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; gap: 20px;
}
.tag {
  font-size: 13px; letter-spacing: 4px; color: #7c3aed;
  text-transform: uppercase; font-family: monospace; font-weight: 600;
}
.headline {
  font-size: 68px; font-weight: 700; line-height: 1.05;
  color: #f0f0ff; letter-spacing: -1px;
}
.headline em {
  font-style: normal;
  background: linear-gradient(135deg, #7c3aed, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub {
  font-size: 20px; color: rgba(255,255,255,0.45);
  font-weight: 400; letter-spacing: 0.5px; max-width: 600px;
}

/* Feature pills */
.pills {
  display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
}
.pill {
  padding: 8px 18px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.6);
  font-size: 14px; letter-spacing: 1px;
  font-family: monospace;
}
.pill.accent { border-color: rgba(124,58,237,0.5); color: #a78bfa; background: rgba(124,58,237,0.1); }
.pill.cyan   { border-color: rgba(6,182,212,0.5);  color: #67e8f9; background: rgba(6,182,212,0.1); }

/* Bottom bar */
.bottombar {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.08);
}
.ist-badge {
  display: flex; align-items: center; gap: 12px;
}
.ist-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
  animation: none;
}
.ist-label {
  font-size: 15px; color: rgba(255,255,255,0.5);
  font-family: monospace; letter-spacing: 1px;
}
.ist-time {
  font-size: 15px; color: #10b981; font-family: monospace; letter-spacing: 2px;
}
.free-badge {
  font-size: 13px; color: rgba(255,255,255,0.3);
  font-family: monospace; letter-spacing: 2px;
}

/* Decorative clock face */
.clock-deco {
  position: absolute; right: 72px; top: 50%;
  transform: translateY(-50%);
  width: 200px; height: 200px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}
.clock-inner {
  width: 160px; height: 160px;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.clock-center {
  width: 8px; height: 8px; border-radius: 50%;
  background: #7c3aed;
  box-shadow: 0 0 12px rgba(124,58,237,0.6);
}
.hand {
  position: absolute; bottom: 50%; left: 50%;
  transform-origin: bottom center;
  border-radius: 2px;
}
.hand-h {
  width: 3px; height: 46px;
  background: rgba(255,255,255,0.6);
  transform: translateX(-50%) rotate(120deg);
}
.hand-m {
  width: 2px; height: 60px;
  background: #7c3aed;
  transform: translateX(-50%) rotate(210deg);
}
.hand-s {
  width: 1px; height: 64px;
  background: #06b6d4;
  transform: translateX(-50%) rotate(280deg);
}
/* Tick marks */
.ticks {
  position: absolute; inset: 0; border-radius: 50%;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="blob3"></div>

<!-- Decorative clock -->
<div class="clock-deco">
  <div class="clock-inner">
    <div class="hand hand-h"></div>
    <div class="hand hand-m"></div>
    <div class="hand hand-s"></div>
    <div class="clock-center"></div>
  </div>
</div>

<div class="container">
  <div class="topbar">
    <div class="logo">time<span>24</span></div>
    <div class="domain">time24.co.in</div>
  </div>

  <div class="center">
    <div class="tag">India's Time Platform</div>
    <div class="headline">Exact time.<br><em>Every timezone.</em></div>
    <div class="sub">World clock · IST converter · Stopwatch · Timer · Calendar · Alarms</div>
    <div class="pills">
      <div class="pill accent">UTC +05:30</div>
      <div class="pill cyan">IST · India</div>
      <div class="pill">Free forever</div>
      <div class="pill">No sign-up</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="ist-badge">
      <div class="ist-dot"></div>
      <div class="ist-label">Live IST —</div>
      <div class="ist-time" id="ist">00:50:16 IST</div>
    </div>
    <div class="free-badge">100% FREE · NO ADS POPUPS</div>
  </div>
</div>

<script>
function updateTime() {
  const now = new Date();
  const ist = new Intl.DateTimeFormat('en-IN', {
    timeZone: 'Asia/Kolkata',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  }).format(now);
  document.getElementById('ist').textContent = ist + ' IST';
}
updateTime();
</script>


</body></html>
